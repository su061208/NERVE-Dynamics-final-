<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Film | NERVE Dynamics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .video-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .btn-back {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(-5px);
        }
        .watermark {
            position: absolute;
            top: 2rem;
            right: 2.5rem;
            color: rgba(255,255,255,0.8);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            z-index: 10;
            pointer-events: none;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 0.1em;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <a href="index.html" class="btn-back"><span>←</span> 홈으로 돌아가기</a>
        <div class="watermark">NERVE Dynamics</div>
        <div class="loading">Loading Brand Film...</div>
        <video src="Main video.mp4" controls autoplay muted></video>
    </div>
</body>
</html>
